- name: Install Nginx
  hosts: web
  become: yes
  tasks:
  - name: Install Nginx if its RHEL
    ansible.builtin.dnf:
      name: nginx
      state: installed
    when: ansible_os_family == "RedHat"

  - name: Install Nginx if its Ubuntu
    ansible.builtin.apt:
      name: nginx
      state: installed
    when: ansible_os_family == "Debian"
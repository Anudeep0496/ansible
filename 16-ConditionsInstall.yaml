- name: Install Nginx
  hosts: web
  tasks:
  - name: Install Nginx if its RHEL
    ansible.builtin.dnf:
      name: Nginx
      state: Installed
    when: ansible_os_family == "RedHat"

  - name: Install Nginx if its Ubuntu
    ansible.builtin.apt:
      name: Nginx
      state: Installed
    when: ansible_os_family == "Debian"
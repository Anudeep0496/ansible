- name : Install multiple packages using loops
  hosts: web
  become: yes
  tasks:
  - name: Install packages using loops
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - {name: 'gcc', state: present}
    - {name: 'git', state: absent}
    - {name: 'nginx', state: present}
    - {name: 'zip', state: absent}
  - name: Create EC2 Instances (frontend, backend, mysql)
    hosts: localhost
    connection: local
    gather_facts: false

    vars:
    region: us-east-1
    instance_type: t3.micro
    key_name: learningdevops
    security_group: default

    # 🔥 Dynamic AMI (Amazon Linux 2023 latest)
    image_id: "{{ lookup('aws_ssm', '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64') }}"

    tasks:

    - name: Create frontend instance
      amazon.aws.ec2_instance:
        name: frontend
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        security_group: "{{ security_group }}"
        wait: yes

    - name: Create backend instance
      amazon.aws.ec2_instance:
        name: backend
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        security_group: "{{ security_group }}"
        wait: yes

    - name: Create mysql instance
      amazon.aws.ec2_instance:
        name: mysql
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        security_group: "{{ security_group }}"
        wait: yes